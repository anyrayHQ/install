name: Attach smoke test

# Installs the Postgres-only attach stack (optimizer + console + Postgres) and
# probes the optimizer auth gate, the console login page, and that the
# gateway-dependent admin routes (spend, trace reads) return 502. No Anyray
# gateway is started, so trace READS are unavailable in attach mode; the
# optimizer still WRITES traces to Postgres via /v1/record.
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  smoke-attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate secrets
        run: ./setup.sh
      - name: Start the attach stack
        run: docker compose -f docker-compose.attach.yml up -d --quiet-pull
      - name: Wait for optimizer health
        run: |
          for _ in $(seq 1 30); do
            if curl -fs http://127.0.0.1:8088/health >/dev/null 2>&1; then exit 0; fi
            sleep 5
          done
          echo "optimizer never became healthy"
          docker compose -f docker-compose.attach.yml ps
          docker compose -f docker-compose.attach.yml logs optimizer
          exit 1
      - name: Wait for console
        run: |
          # The console proxy serves /anyray-login from nginx directly once it's up.
          # Attach mode runs no trace-read backend (no gateway; the optimizer only
          # WRITES traces via /v1/record), so there is nothing else to wait on here.
          login=""
          for _ in $(seq 1 60); do
            login=$(curl -so /dev/null -w '%{http_code}' http://127.0.0.1:3000/anyray-login 2>/dev/null || true)
            if [ "$login" = "200" ]; then
              echo "console ready"
              exit 0
            fi
            sleep 5
          done
          echo "console never became ready (login=$login)"
          docker compose -f docker-compose.attach.yml ps
          docker compose -f docker-compose.attach.yml logs proxy
          exit 1
      - name: Probe surfaces
        run: |
          set -e
          ADMIN=$(grep '^ANYRAY_ADMIN_TOKEN=' .env | cut -d= -f2)

          # Optimizer auth gate
          test "$(curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8088/admin/auth -H "Authorization: Bearer $ADMIN")" = "200"
          test "$(curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8088/admin/auth -H "Authorization: Bearer wrong")" = "401"
          test "$(curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8088/admin/auth)" = "401"

          # Console login page
          curl -fso /dev/null http://127.0.0.1:3000/anyray-login

          # Gateway-dependent admin routes return 502, not a redirect loop. Trace
          # READS need the gateway (it answers /admin/observability/* from the trace
          # store in-process); attach mode has no gateway and the optimizer has no
          # read route, so the console trace views are unavailable here. Writes are
          # unaffected — the optimizer still persists traces to Postgres via
          # /v1/record.
          test "$(curl -so /dev/null -w '%{http_code}' "http://127.0.0.1:3000/admin/observability/traces?page=1" -H "Cookie: anyray_key=$ADMIN")" = "502"
          test "$(curl -so /dev/null -w '%{http_code}' http://127.0.0.1:3000/admin/spend -H "Cookie: anyray_key=$ADMIN")" = "502"

          echo "all attach probes passed"
      - name: Logs on failure
        if: failure()
        run: docker compose -f docker-compose.attach.yml ps && docker compose -f docker-compose.attach.yml logs
