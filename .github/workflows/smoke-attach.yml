name: Attach smoke test

# Installs the attach stack (optimizer + observability only) and probes
# the optimizer auth gate, the console login page, and the observability
# read path (nginx → trace backend rewrite). No Anyray gateway is started.
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  smoke-attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate secrets
        run: ./setup.sh
      - name: Start the attach stack
        run: docker compose -f docker-compose.attach.yml up -d --quiet-pull
      - name: Wait for optimizer health
        run: |
          for _ in $(seq 1 30); do
            if curl -fs http://127.0.0.1:8088/health >/dev/null 2>&1; then exit 0; fi
            sleep 5
          done
          echo "optimizer never became healthy"
          docker compose -f docker-compose.attach.yml ps
          docker compose -f docker-compose.attach.yml logs optimizer
          exit 1
      - name: Wait for console + observability backend
        run: |
          # /anyray-login is served by nginx directly, so it goes 200 well before
          # the Langfuse `web` API backend (:3000) finishes its cold start. Waiting
          # only on the login page lets the observability probe below race web and
          # get a 502 (nginx "connection refused" to the upstream). Wait for the
          # actual read path (nginx -> web /api/public/*) to return 200 instead.
          ADMIN=$(grep '^ANYRAY_ADMIN_TOKEN=' .env | cut -d= -f2)
          login=""; traces=""
          for _ in $(seq 1 60); do
            login=$(curl -so /dev/null -w '%{http_code}' http://127.0.0.1:3000/anyray-login 2>/dev/null || true)
            traces=$(curl -so /dev/null -w '%{http_code}' "http://127.0.0.1:3000/admin/observability/traces?page=1" -H "Cookie: anyray_key=$ADMIN" 2>/dev/null || true)
            if [ "$login" = "200" ] && [ "$traces" = "200" ]; then
              echo "console + observability backend ready"
              exit 0
            fi
            sleep 5
          done
          echo "console/observability never became ready (login=$login traces=$traces)"
          docker compose -f docker-compose.attach.yml ps
          docker compose -f docker-compose.attach.yml logs proxy web
          exit 1
      - name: DIAGNOSE observability 400 (temporary)
        if: failure()
        run: |
          ADMIN=$(grep '^ANYRAY_ADMIN_TOKEN=' .env | cut -d= -f2)
          PK=$(grep '^ANYRAY_OBSERVABILITY_PUBLIC_KEY=' .env | cut -d= -f2)
          SK=$(grep '^ANYRAY_OBSERVABILITY_SECRET_KEY=' .env | cut -d= -f2)
          echo "=== A) via proxy /admin/observability/traces (full response) ==="
          curl -isS "http://127.0.0.1:3000/admin/observability/traces?page=1" -H "Cookie: anyray_key=$ADMIN" | head -40 || true
          echo "=== B) proxy: rendered Authorization line + OBS env ==="
          docker compose -f docker-compose.attach.yml exec -T proxy sh -c 'env | grep -i OBS; echo ---; grep -n "Authorization" /etc/nginx/conf.d/default.conf' || true
          echo "=== C) direct to langfuse web /api/public/traces with .env keys (Basic pk:sk) ==="
          docker compose -f docker-compose.attach.yml exec -T proxy sh -c "curl -isS -u '$PK:$SK' 'http://web:3000/api/public/traces?page=1'" | head -40 || true
          echo "=== D) langfuse health + projects/keys (no auth) ==="
          docker compose -f docker-compose.attach.yml exec -T proxy sh -c "curl -isS 'http://web:3000/api/public/health' | head -10; echo; curl -isS 'http://web:3000/api/public/traces?page=1' | head -10" || true
          echo "=== E) web init-script provisioning lines ==="
          docker compose -f docker-compose.attach.yml logs web 2>&1 | grep -iE "init|seed|project|org|api[- ]?key|created|skip|already|headless|error" | grep -ivE "migration|_idx" | head -30 || true
      - name: Probe surfaces
        run: |
          set -e
          ADMIN=$(grep '^ANYRAY_ADMIN_TOKEN=' .env | cut -d= -f2)

          # Optimizer auth gate
          test "$(curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8088/admin/auth -H "Authorization: Bearer $ADMIN")" = "200"
          test "$(curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8088/admin/auth -H "Authorization: Bearer wrong")" = "401"
          test "$(curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8088/admin/auth)" = "401"

          # Console login page
          curl -fso /dev/null http://127.0.0.1:3000/anyray-login

          # Observability read path through nginx rewrite
          test "$(curl -so /dev/null -w '%{http_code}' "http://127.0.0.1:3000/admin/observability/traces?page=1" -H "Cookie: anyray_key=$ADMIN")" = "200"

          # Gateway-dependent route returns 502, not a redirect loop
          test "$(curl -so /dev/null -w '%{http_code}' http://127.0.0.1:3000/admin/spend -H "Cookie: anyray_key=$ADMIN")" = "502"

          echo "all attach probes passed"
      - name: Logs on failure
        if: failure()
        run: docker compose -f docker-compose.attach.yml ps && docker compose -f docker-compose.attach.yml logs
