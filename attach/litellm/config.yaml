# LiteLLM proxy config — Anyray attach-mode integration snippet.
# Merge into your existing config.yaml or use as a standalone example.
#
# Required env vars (set in your .env or shell, then: docker compose -f docker-compose.attach.yml up -d):
#   ANYRAY_OPTIMIZER_URL          e.g. http://<anyray-host>:8088
#   ANYRAY_OPTIMIZER_TOKEN        from ./setup.sh → .env

model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  # Add more models as needed.

litellm_settings:
  # Anyray optimizer hooks: transform the request pre-call, transform the
  # response post-call, and record each call as a trace. Reference the
  # module-level instance (proxy_handler_instance), not the class — LiteLLM's
  # get_instance_fn returns the named attribute as-is and appends it to
  # litellm.callbacks; a class would be called without instantiation.
  callbacks:
    - anyray_optimizer.proxy_handler_instance

# Traces/spend are emitted by the OPTIMIZER, not LiteLLM: the adapter's log hooks
# POST each call to the optimizer's /v1/record, which writes the trace.
# The attach stack already wires this (ANYRAY_OBSERVABILITY_* on the optimizer
# service in docker-compose.attach.yml), so no trace-backend config is needed
# here. Do NOT add a native `success_callback: langfuse` — it would record twice.
