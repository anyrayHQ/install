server {
  listen 80;
  server_name _;
  absolute_redirect off;

  # Attach mode: auth is validated against the optimizer, not the gateway.
  location = /__auth {
    internal;
    proxy_pass http://optimizer:8088/admin/auth;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Authorization "Bearer $cookie_anyray_key";
  }

  location = /anyray-login {
    alias /assets/login.html;
    default_type text/html;
    add_header Cache-Control "no-store";
  }

  # Login page validation. The shared login.html sets anyray_key, then probes
  # /admin/auth. Full mode sends this to the gateway; attach mode has no gateway,
  # so validate directly against the optimizer's admin auth probe instead.
  location = /admin/auth {
    proxy_pass http://optimizer:8088/admin/auth;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Authorization "Bearer $cookie_anyray_key";
  }

  # Trace ingestion is not served here: the LiteLLM adapter POSTs traces straight
  # to the optimizer's /v1/record on :8088 (ANYRAY_OPTIMIZER_URL), which writes
  # them content-free to the Anyray trace store in Postgres — there is no external
  # ingestion API in front of nginx.

  location = /logo.svg       { alias /assets/logo.svg;       default_type image/svg+xml; add_header Cache-Control "no-cache"; }
  location = /logo-white.svg { alias /assets/logo-white.svg; default_type image/svg+xml; add_header Cache-Control "no-cache"; }
  location = /icon.svg       { alias /assets/icon.svg;       default_type image/svg+xml; add_header Cache-Control "no-cache"; }

  location /console/ {
    auth_request /__auth;
    error_page 401 = /anyray-login;
    root /usr/share/nginx/html;
    try_files $uri /console/index.html;
    add_header Cache-Control "no-cache";
  }

  location /admin/optimizer/ {
    auth_request /__auth;
    proxy_pass http://optimizer:8088;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Authorization "Bearer $cookie_anyray_key";
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Trace/session READS (/admin/observability/*) need the gateway, which answers
  # them from the Anyray trace store in-process. Attach mode has no gateway and
  # the optimizer exposes no read route, so console trace views are unavailable
  # here — the optimizer still WRITES traces to Postgres via /v1/record, but
  # surfacing them needs an optimizer read route (tracked upstream). Until then
  # these fall through to the generic 502 below, like the other gateway-only
  # admin APIs.

  # Gateway-dependent admin APIs unavailable in attach mode.
  location /admin/ {
    auth_request /__auth;
    add_header Content-Type application/json always;
    return 502 '{"error":"gateway not available in attach mode"}';
  }

  location = / { return 302 /console/; }
  location /   { return 302 /console/; }
}
