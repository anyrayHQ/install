AWSTemplateFormatVersion: '2010-09-09'

Description: >-
  Anyray one-click deploy (ECS/Fargate). Brings up the full self-hosted stack as
  managed containers — gateway + optimizer + console proxy on AWS Fargate, with a
  managed RDS PostgreSQL store and EFS for runtime config. An Application Load
  Balancer fronts the gateway API (:8787) and the console (:3000), scoped to the
  CIDR you provide (never 0.0.0.0/0). All secrets are generated by CloudFormation
  into Secrets Manager — no bootstrap script. Content stays encrypted at rest;
  only metadata is logged.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: Networking }
        Parameters: [VpcId, SubnetA, SubnetB, AllowedCidr]
      - Label: { default: Images }
        Parameters: [ImageTag, DefaultModel]
      - Label: { default: Ingress / TLS }
        Parameters: [CertificateArn, GatewayPublicUrl, ConsolePublicUrl]
      - Label: { default: Anyray Cloud (metering) }
        Parameters: [DeploymentToken]
      - Label: { default: Content privacy }
        Parameters: [ContentMode, AllowPlaintext]
      - Label: { default: Gateway hardening }
        Parameters:
          [
            RequireClientKeys,
            RequireVerifiedDev,
            Hsts,
            RateLimitRpm,
            RateLimitIpRpm,
            RateLimitUnauthRpm,
            MaxConcurrentRequests,
            MaxBodyBytes,
          ]
      - Label: { default: Optimizer }
        Parameters: [OptimizerTimeoutMs, OptimizerVisionTimeoutMs]
      - Label: { default: Database }
        Parameters: [DbInstanceClass, DbAllocatedStorage]
    ParameterLabels:
      AllowedCidr: { default: "Allowed CIDR (your office/VPN range)" }
      SubnetA: { default: "Public subnet in AZ 1" }
      SubnetB: { default: "Public subnet in AZ 2 (different AZ)" }

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to launch Anyray into.
  SubnetA:
    Type: AWS::EC2::Subnet::Id
    Description: >-
      A PUBLIC subnet that auto-assigns a public IPv4. Tasks pull images from
      GHCR and reach the Portal/providers directly (no NAT gateway).
  SubnetB:
    Type: AWS::EC2::Subnet::Id
    Description: >-
      A second PUBLIC subnet in a DIFFERENT AZ — the load balancer and RDS both
      require two AZs.
  AllowedCidr:
    Type: String
    Description: >-
      CIDR range allowed to reach the console (:3000) and gateway (:8787) through
      the load balancer. Scope this to your office / VPN range. Do NOT use
      0.0.0.0/0.
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    ConstraintDescription: Must be a CIDR like 203.0.113.0/24 (not 0.0.0.0/0).
  ImageTag:
    Type: String
    Default: stable
    Description: Anyray image tag to deploy. stable is the nightly release channel; use vX.Y.Z to pin.
  DefaultModel:
    Type: String
    Default: 'anthropic/claude-sonnet-4-5'
    Description: >-
      Model the `anyray-default` routing sentinel resolves to. Set it to a model
      your configured provider serves (a bare model is read under `anthropic`).
  CertificateArn:
    Type: String
    Default: ''
    AllowedPattern: '^$|^arn:aws:acm:.+$'
    Description: >-
      Optional ACM certificate ARN. If set, both listeners serve HTTPS; if empty,
      they serve HTTP (scoped to AllowedCidr).
  GatewayPublicUrl:
    Type: String
    Default: ''
    AllowedPattern: '^$|^https?://\S+$'
    Description: Optional externally reachable gateway URL (defaults to the load balancer DNS).
  ConsolePublicUrl:
    Type: String
    Default: ''
    AllowedPattern: '^$|^https?://\S+$'
    Description: Optional externally reachable console URL (defaults to the load balancer DNS).
  DeploymentToken:
    Type: String
    NoEcho: true
    AllowedPattern: '^adt_[A-Za-z0-9_-]+$'
    Description: Anyray Cloud deployment token (adt_...) for usage metering.
  ContentMode:
    Type: String
    Default: encrypted
    AllowedValues: ['encrypted', 'off', 'plaintext']
    Description: Content-privacy mode. `encrypted` (default) keeps content as AES-256-GCM ciphertext.
  AllowPlaintext:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Deploy gate that must be true before `plaintext` content mode can be selected.
  RequireClientKeys:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Require minted Anyray client keys for gateway requests.
  RequireVerifiedDev:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Restrict /v1 traffic to verified developers.
  Hsts:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Emit HSTS headers (set true only when served over HTTPS).
  RateLimitRpm:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[0-9]+$'
    Description: Optional per-identity /v1 request limit per minute.
  RateLimitIpRpm:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[0-9]+$'
    Description: Optional per-source-IP /v1 request limit per minute.
  RateLimitUnauthRpm:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[0-9]+$'
    Description: Optional unauthenticated endpoint request limit per minute.
  MaxConcurrentRequests:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[0-9]+$'
    Description: Optional max concurrent /v1 requests per identity or IP.
  MaxBodyBytes:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[0-9]+$'
    Description: Optional max request body size in bytes.
  OptimizerTimeoutMs:
    Type: String
    Default: '800'
    AllowedPattern: '^[0-9]+$'
    Description: Optimizer timeout for normal requests in milliseconds.
  OptimizerVisionTimeoutMs:
    Type: String
    Default: '10000'
    AllowedPattern: '^[0-9]+$'
    Description: Optimizer timeout for vision requests in milliseconds.
  DbInstanceClass:
    Type: String
    Default: db.t4g.micro
    Description: RDS PostgreSQL instance class.
  DbAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    Description: RDS allocated storage in GiB.

Rules:
  AllowedCidrMustNotBePublic:
    Assertions:
      - Assert: !Not [!Equals [!Ref AllowedCidr, '0.0.0.0/0']]
        AssertDescription: AllowedCidr must be scoped to your org or VPN, not 0.0.0.0/0.

Conditions:
  HasCert: !Not [!Equals [!Ref CertificateArn, '']]
  HasGatewayUrl: !Not [!Equals [!Ref GatewayPublicUrl, '']]
  HasConsoleUrl: !Not [!Equals [!Ref ConsolePublicUrl, '']]

Resources:
  # ---- Secret generation (no setup.sh) --------------------------------------
  SecretFnRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: anyray-secret-gen
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:PutSecretValue
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DeleteSecret
                  - secretsmanager:TagResource
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}/anyray/*'
              # The DbUrl composer reads the RDS-managed master secret (named rds!db-…,
              # outside the ${StackName}/anyray/* prefix) to compose the connection URL.
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !GetAtt Db.MasterUserSecret.SecretArn

  SecretFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 60
      Role: !GetAtt SecretFnRole.Arn
      Code:
        ZipFile: |
          import json, secrets as rnd, urllib.request, urllib.parse, traceback, boto3
          sm = boto3.client('secretsmanager')

          def send(event, context, status, data=None, pid=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': 'See CloudWatch log stream ' + context.log_stream_name,
                  'PhysicalResourceId': pid or event.get('PhysicalResourceId') or context.log_stream_name,
                  'StackId': event['StackId'], 'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {},
              }).encode()
              req = urllib.request.Request(event['ResponseURL'], data=body, method='PUT',
                  headers={'content-type': '', 'content-length': str(len(body))})
              urllib.request.urlopen(req)

          def ensure(name, gen):
              # create-if-missing; never overwrite (content key / salt must be stable)
              try:
                  return sm.create_secret(Name=name, SecretString=gen())['ARN']
              except sm.exceptions.ResourceExistsException:
                  return sm.describe_secret(SecretId=name)['ARN']

          def put(name, value):
              try:
                  return sm.create_secret(Name=name, SecretString=value)['ARN']
              except sm.exceptions.ResourceExistsException:
                  sm.put_secret_value(SecretId=name, SecretString=value)
                  return sm.describe_secret(SecretId=name)['ARN']

          def handler(event, context):
              try:
                  rt = event['RequestType']; props = event['ResourceProperties']
                  action = props['Action']; prefix = props['Prefix']
                  if rt == 'Delete':
                      for n in props.get('Names', []):
                          try:
                              sm.delete_secret(SecretId=prefix + n, ForceDeleteWithoutRecovery=True)
                          except Exception:
                              pass
                      return send(event, context, 'SUCCESS', {}, prefix + action)
                  if action == 'generate':
                      data = {
                          'ContentKeyArn': ensure(prefix + 'content-key', lambda: rnd.token_hex(32)),
                          'OptimizerTokenArn': ensure(prefix + 'optimizer-token', lambda: rnd.token_hex(32)),
                          'AdminTokenArn': ensure(prefix + 'admin-token', lambda: 'ar-adm-' + rnd.token_hex(16)),
                          'SaltArn': ensure(prefix + 'pseudonym-salt', lambda: rnd.token_hex(32)),
                      }
                      return send(event, context, 'SUCCESS', data, prefix + 'generate')
                  if action == 'composeDbUrl':
                      m = json.loads(sm.get_secret_value(SecretId=props['MasterSecretArn'])['SecretString'])
                      # URL-encode credentials: the RDS-managed master password can
                      # contain URL-reserved chars (?, #, /, @, %, …) that otherwise
                      # corrupt the postgresql:// connection string ("Invalid URL").
                      # sslmode=no-verify: RDS (PG15+) forces SSL via rds.force_ssl, and
                      # the gateway's pg client has no RDS CA bundle — encrypt in transit
                      # without cert verification (the DB is private, in-VPC only).
                      q = lambda s: urllib.parse.quote(s, safe='')
                      url = 'postgresql://%s:%s@%s:5432/%s?sslmode=no-verify' % (
                          q(m['username']), q(m['password']), props['DbHost'], props['DbName'])
                      return send(event, context, 'SUCCESS',
                          {'DbUrlArn': put(prefix + 'db-url', url)}, prefix + 'composeDbUrl')
                  return send(event, context, 'FAILED', {'Error': 'unknown action'}, prefix + action)
              except Exception as e:
                  print('SecretFn FAILED:', traceback.format_exc())
                  return send(event, context, 'FAILED', {'Error': str(e)}, event.get('PhysicalResourceId'))

  AppSecrets:
    Type: Custom::AnyraySecrets
    Properties:
      ServiceToken: !GetAtt SecretFn.Arn
      Action: generate
      Prefix: !Sub '${AWS::StackName}/anyray/'
      Names: [content-key, optimizer-token, admin-token, pseudonym-salt]

  DbUrlSecret:
    Type: Custom::AnyrayDbUrl
    Properties:
      ServiceToken: !GetAtt SecretFn.Arn
      Action: composeDbUrl
      Prefix: !Sub '${AWS::StackName}/anyray/'
      Names: [db-url]
      MasterSecretArn: !GetAtt Db.MasterUserSecret.SecretArn
      DbHost: !GetAtt Db.Endpoint.Address
      DbName: postgres

  # ---- Networking / security groups -----------------------------------------
  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Anyray ALB - console (:3000) and gateway (:8787) from a scoped CIDR.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 8787, ToPort: 8787, CidrIp: !Ref AllowedCidr, Description: Gateway API }
        - { IpProtocol: tcp, FromPort: 3000, ToPort: 3000, CidrIp: !Ref AllowedCidr, Description: Console }
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: !Ref AllowedCidr, Description: HTTPS (when CertificateArn set) }
      Tags: [{ Key: Name, Value: anyray-alb }]

  TasksSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Anyray Fargate tasks.
      VpcId: !Ref VpcId
      Tags: [{ Key: Name, Value: anyray-tasks }]

  TasksFromAlbGateway:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TasksSg
      IpProtocol: tcp
      FromPort: 8787
      ToPort: 8787
      SourceSecurityGroupId: !Ref AlbSg
      Description: Gateway target from ALB

  TasksFromAlbProxy:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TasksSg
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      SourceSecurityGroupId: !Ref AlbSg
      Description: Console proxy target from ALB

  TasksSelfGateway:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TasksSg
      IpProtocol: tcp
      FromPort: 8787
      ToPort: 8787
      SourceSecurityGroupId: !Ref TasksSg
      Description: Service Connect - proxy/optimizer to gateway

  TasksSelfOptimizer:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TasksSg
      IpProtocol: tcp
      FromPort: 8088
      ToPort: 8088
      SourceSecurityGroupId: !Ref TasksSg
      Description: Service Connect - gateway/proxy to optimizer

  RdsSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Anyray RDS - Postgres from the Fargate tasks only.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 5432, ToPort: 5432, SourceSecurityGroupId: !Ref TasksSg, Description: Postgres from tasks }
      Tags: [{ Key: Name, Value: anyray-rds }]

  EfsSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Anyray EFS - NFS from the Fargate tasks only.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 2049, ToPort: 2049, SourceSecurityGroupId: !Ref TasksSg, Description: NFS from tasks }
      Tags: [{ Key: Name, Value: anyray-efs }]

  # ---- RDS PostgreSQL ---------------------------------------------------------
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Anyray RDS subnet group.
      SubnetIds: [!Ref SubnetA, !Ref SubnetB]

  Db:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: postgres
      EngineVersion: '17.5'
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: !Ref DbAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: postgres
      ManageMasterUserPassword: true
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups: [!Ref RdsSg]
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 7
      Tags: [{ Key: Name, Value: anyray }]

  # ---- EFS for gateway + optimizer /data -------------------------------------
  Efs:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      FileSystemTags: [{ Key: Name, Value: anyray }]

  EfsMountA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref Efs
      SubnetId: !Ref SubnetA
      SecurityGroups: [!Ref EfsSg]

  EfsMountB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref Efs
      SubnetId: !Ref SubnetB
      SecurityGroups: [!Ref EfsSg]

  GatewayAp:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref Efs
      RootDirectory:
        Path: /gateway
        CreationInfo: { OwnerUid: '0', OwnerGid: '0', Permissions: '0777' }

  OptimizerAp:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref Efs
      RootDirectory:
        Path: /optimizer
        CreationInfo: { OwnerUid: '0', OwnerGid: '0', Permissions: '0777' }

  # ---- ECS cluster + IAM ------------------------------------------------------
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${AWS::StackName}-anyray'

  Namespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: anyray.internal
      Vpc: !Ref VpcId

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: anyray-read-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}/anyray/*'

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: anyray-efs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                Resource: !GetAtt Efs.Arn

  GatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/anyray/${AWS::StackName}/gateway'
      RetentionInDays: 30
  OptimizerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/anyray/${AWS::StackName}/optimizer'
      RetentionInDays: 30
  ProxyLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/anyray/${AWS::StackName}/proxy'
      RetentionInDays: 30

  # ---- Load balancer ----------------------------------------------------------
  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Type: application
      Scheme: internet-facing
      Subnets: [!Ref SubnetA, !Ref SubnetB]
      SecurityGroups: [!Ref AlbSg]

  GatewayTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VpcId
      TargetType: ip
      Port: 8787
      Protocol: HTTP
      HealthCheckPath: /
      Matcher: { HttpCode: 200-399 }
      TargetGroupAttributes:
        - { Key: deregistration_delay.timeout_seconds, Value: '15' }

  ProxyTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VpcId
      TargetType: ip
      Port: 80
      Protocol: HTTP
      HealthCheckPath: /anyray-login
      Matcher: { HttpCode: 200-399 }
      TargetGroupAttributes:
        - { Key: deregistration_delay.timeout_seconds, Value: '15' }

  GatewayListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 8787
      Protocol: !If [HasCert, HTTPS, HTTP]
      Certificates: !If [HasCert, [{ CertificateArn: !Ref CertificateArn }], !Ref 'AWS::NoValue']
      DefaultActions:
        - { Type: forward, TargetGroupArn: !Ref GatewayTg }

  ConsoleListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 3000
      Protocol: !If [HasCert, HTTPS, HTTP]
      Certificates: !If [HasCert, [{ CertificateArn: !Ref CertificateArn }], !Ref 'AWS::NoValue']
      DefaultActions:
        - { Type: forward, TargetGroupArn: !Ref ProxyTg }

  # ---- Task definitions -------------------------------------------------------
  OptimizerTask:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${AWS::StackName}-optimizer'
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      Volumes:
        - Name: data
          EFSVolumeConfiguration:
            FilesystemId: !Ref Efs
            TransitEncryption: ENABLED
            AuthorizationConfig: { AccessPointId: !Ref OptimizerAp, IAM: ENABLED }
      ContainerDefinitions:
        - Name: optimizer
          Image: !Sub 'ghcr.io/anyrayhq/optimizer:${ImageTag}'
          Essential: true
          PortMappings:
            - { Name: optimizer, ContainerPort: 8088, Protocol: tcp }
          MountPoints:
            - { SourceVolume: data, ContainerPath: /data }
          Environment:
            - { Name: PORT, Value: '8088' }
            - { Name: ANYRAY_DATA_DIR, Value: /data }
          Secrets:
            - { Name: ANYRAY_OPTIMIZER_TOKEN, ValueFrom: !GetAtt AppSecrets.OptimizerTokenArn }
            - { Name: ANYRAY_ADMIN_TOKEN, ValueFrom: !GetAtt AppSecrets.AdminTokenArn }
          HealthCheck:
            Command: [CMD-SHELL, 'wget -qO- http://localhost:8088/health || exit 1']
            Interval: 10
            Timeout: 5
            Retries: 10
            StartPeriod: 20
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref OptimizerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: optimizer

  GatewayTask:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${AWS::StackName}-gateway'
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      Volumes:
        - Name: data
          EFSVolumeConfiguration:
            FilesystemId: !Ref Efs
            TransitEncryption: ENABLED
            AuthorizationConfig: { AccessPointId: !Ref GatewayAp, IAM: ENABLED }
      ContainerDefinitions:
        - Name: gateway
          Image: !Sub 'ghcr.io/anyrayhq/gateway:${ImageTag}'
          Essential: true
          PortMappings:
            - { Name: gateway, ContainerPort: 8787, Protocol: tcp }
          MountPoints:
            - { SourceVolume: data, ContainerPath: /data }
          Environment:
            - { Name: ANYRAY_OPTIMIZER_URL, Value: 'http://optimizer:8088' }
            - { Name: ANYRAY_OPTIMIZER_TIMEOUT_MS, Value: !Ref OptimizerTimeoutMs }
            - { Name: ANYRAY_OPTIMIZER_VISION_TIMEOUT_MS, Value: !Ref OptimizerVisionTimeoutMs }
            - { Name: ANYRAY_DEFAULT_MODEL, Value: !Ref DefaultModel }
            - { Name: ANYRAY_CONTENT_MODE, Value: !Ref ContentMode }
            - { Name: ANYRAY_ALLOW_PLAINTEXT, Value: !Ref AllowPlaintext }
            - { Name: ANYRAY_DATA_DIR, Value: /data }
            - { Name: ANYRAY_TRUST_PROXY, Value: 'true' }
            - { Name: ANYRAY_HSTS, Value: !Ref Hsts }
            - { Name: ANYRAY_REQUIRE_CLIENT_KEYS, Value: !Ref RequireClientKeys }
            - { Name: ANYRAY_REQUIRE_VERIFIED_DEV, Value: !Ref RequireVerifiedDev }
            - { Name: ANYRAY_RATE_LIMIT_RPM, Value: !Ref RateLimitRpm }
            - { Name: ANYRAY_RATE_LIMIT_IP_RPM, Value: !Ref RateLimitIpRpm }
            - { Name: ANYRAY_RATE_LIMIT_UNAUTH_RPM, Value: !Ref RateLimitUnauthRpm }
            - { Name: ANYRAY_MAX_CONCURRENT_REQUESTS, Value: !Ref MaxConcurrentRequests }
            - { Name: ANYRAY_MAX_BODY_BYTES, Value: !Ref MaxBodyBytes }
            - { Name: ANYRAY_METERING_ENABLED, Value: 'true' }
            - { Name: ANYRAY_DEPLOYMENT_TOKEN, Value: !Ref DeploymentToken }
            - Name: ANYRAY_GATEWAY_PUBLIC_URL
              Value: !If
                - HasGatewayUrl
                - !Ref GatewayPublicUrl
                - !If [HasCert, !Sub 'https://${Alb.DNSName}:8787', !Sub 'http://${Alb.DNSName}:8787']
            - Name: ANYRAY_CONSOLE_PUBLIC_URL
              Value: !If
                - HasConsoleUrl
                - !Ref ConsolePublicUrl
                - !If [HasCert, !Sub 'https://${Alb.DNSName}:3000', !Sub 'http://${Alb.DNSName}:3000']
          Secrets:
            - { Name: ANYRAY_SPEND_DB_URL, ValueFrom: !GetAtt DbUrlSecret.DbUrlArn }
            - { Name: ANYRAY_OBSERVABILITY_DB_URL, ValueFrom: !GetAtt DbUrlSecret.DbUrlArn }
            - { Name: ANYRAY_CONTENT_KEY, ValueFrom: !GetAtt AppSecrets.ContentKeyArn }
            - { Name: ANYRAY_ADMIN_TOKEN, ValueFrom: !GetAtt AppSecrets.AdminTokenArn }
            - { Name: ANYRAY_OPTIMIZER_TOKEN, ValueFrom: !GetAtt AppSecrets.OptimizerTokenArn }
            - { Name: ANYRAY_PSEUDONYM_SALT, ValueFrom: !GetAtt AppSecrets.SaltArn }
          HealthCheck:
            Command: [CMD-SHELL, 'wget -qO- http://localhost:8787/ || exit 1']
            Interval: 10
            Timeout: 5
            Retries: 10
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref GatewayLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: gateway

  ProxyTask:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${AWS::StackName}-proxy'
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: proxy
          Image: !Sub 'ghcr.io/anyrayhq/proxy:${ImageTag}'
          Essential: true
          PortMappings:
            - { Name: proxy, ContainerPort: 80, Protocol: tcp }
          Environment:
            # The baked nginx envsubst template needs these set or it crashloops
            # (the EKS proxy incident — install #54).
            - { Name: ANYRAY_UPDATER_ENABLED, Value: 'false' }
            - { Name: ANYRAY_UPDATER_TOKEN, Value: '' }
            - { Name: ANYRAY_UPDATER_PERIODIC_POLLS, Value: 'false' }
            - { Name: ANYRAY_UPDATER_POLL_INTERVAL, Value: '86400' }
          HealthCheck:
            Command: [CMD-SHELL, 'wget -qO- http://localhost:80/anyray-login || exit 1']
            Interval: 10
            Timeout: 5
            Retries: 10
            StartPeriod: 20
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ProxyLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: proxy

  # ---- Services (Service Connect wires bare hostnames) ------------------------
  OptimizerService:
    Type: AWS::ECS::Service
    DependsOn: [EfsMountA, EfsMountB]
    Properties:
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: 1
      TaskDefinition: !Ref OptimizerTask
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: [!Ref SubnetA, !Ref SubnetB]
          SecurityGroups: [!Ref TasksSg]
      ServiceConnectConfiguration:
        Enabled: true
        Namespace: !GetAtt Namespace.Arn
        Services:
          - PortName: optimizer
            DiscoveryName: optimizer
            ClientAliases: [{ Port: 8088, DnsName: optimizer }]

  GatewayService:
    Type: AWS::ECS::Service
    DependsOn: [GatewayListener, EfsMountA, EfsMountB]
    Properties:
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: 1
      TaskDefinition: !Ref GatewayTask
      HealthCheckGracePeriodSeconds: 300
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: [!Ref SubnetA, !Ref SubnetB]
          SecurityGroups: [!Ref TasksSg]
      LoadBalancers:
        - { TargetGroupArn: !Ref GatewayTg, ContainerName: gateway, ContainerPort: 8787 }
      ServiceConnectConfiguration:
        Enabled: true
        Namespace: !GetAtt Namespace.Arn
        Services:
          - PortName: gateway
            DiscoveryName: gateway
            ClientAliases: [{ Port: 8787, DnsName: gateway }]

  ProxyService:
    Type: AWS::ECS::Service
    DependsOn: [ConsoleListener]
    Properties:
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: 1
      TaskDefinition: !Ref ProxyTask
      HealthCheckGracePeriodSeconds: 120
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: [!Ref SubnetA, !Ref SubnetB]
          SecurityGroups: [!Ref TasksSg]
      LoadBalancers:
        - { TargetGroupArn: !Ref ProxyTg, ContainerName: proxy, ContainerPort: 80 }
      ServiceConnectConfiguration:
        Enabled: true
        Namespace: !GetAtt Namespace.Arn

Outputs:
  ConsoleURL:
    Description: Open this and sign in with the admin token (see AdminTokenCmd below).
    Value: !If
      - HasConsoleUrl
      - !Ref ConsolePublicUrl
      - !If [HasCert, !Sub 'https://${Alb.DNSName}:3000', !Sub 'http://${Alb.DNSName}:3000']
  GatewayURL:
    Description: Gateway API base URL — point local tools at it with `anyray-connect --gateway <url>`.
    Value: !If
      - HasGatewayUrl
      - !Ref GatewayPublicUrl
      - !If [HasCert, !Sub 'https://${Alb.DNSName}:8787', !Sub 'http://${Alb.DNSName}:8787']
  AdminTokenCmd:
    Description: Fetch the generated admin key from Secrets Manager (it is NOT printed in stack outputs).
    Value: !Sub 'aws secretsmanager get-secret-value --region ${AWS::Region} --secret-id ${AppSecrets.AdminTokenArn} --query SecretString --output text'
  FirstBootNote:
    Description: First boot pulls images, provisions RDS, and seeds prices; allow ~5-10 min. The gateway restarts until RDS is reachable.
    Value: 'Watch the ECS services in the console; the gateway + console go healthy once RDS is up.'
