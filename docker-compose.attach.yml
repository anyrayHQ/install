name: anyray-attach

# Anyray attach mode: optimizer + console only (Postgres-only trace store).
# For orgs with an existing AI gateway (LiteLLM, Kong, Envoy, …).
# The gateway plugin/callback calls the optimizer, which records content-free
# traces straight into Postgres via /v1/record (no Anyray gateway in the path).
#
# Generate secrets: ./setup.sh
# Console → http://<host>:3000
# Optimizer hook → http://<host>:8088  (in-network only)
# Docs → https://docs.anyray.ai/attach

# Bound every container's JSON log so a chatty service can't fill the disk.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  optimizer:
    logging: *default-logging
    image: "${ANYRAY_OPTIMIZER_IMAGE:-ghcr.io/anyrayhq/optimizer:${ANYRAY_IMAGE_TAG:-v1.10.17}}"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Exposed so the org's gateway plugin can reach it from outside Docker.
      - "${ANYRAY_OPTIMIZER_BIND:-127.0.0.1}:8088:8088"
    environment:
      PORT: 8088
      ANYRAY_OPTIMIZER_TOKEN: ${ANYRAY_OPTIMIZER_TOKEN:?run ./setup.sh first}
      ANYRAY_ADMIN_TOKEN: ${ANYRAY_ADMIN_TOKEN:?run ./setup.sh first}
      ANYRAY_OPTIMIZER_CONFIG: /data/optimizer.config.json
      ANYRAY_OPTIMIZER_AUDIT_FILE: /data/optimizer-settings-audit.log
      # BYO trace persistence (opt-in): the optimizer's /v1/record writes the same
      # content-free traces the Anyray gateway writes in-process, straight to the
      # Anyray trace store in Postgres (anyray_traces / anyray_observations,
      # auto-created; content AES-256-GCM encrypted at rest). Set ONLY in
      # attach/BYO mode (no Anyray gateway in the path) — never on the optimizer in
      # an Anyray-gateway deployment, or every call would be recorded twice. A
      # missing content key degrades persistence to 'off'.
      ANYRAY_OBSERVABILITY_DB_URL: ${ANYRAY_OBSERVABILITY_DB_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-}@postgres:5432/postgres}
      ANYRAY_CONTENT_KEY: ${ANYRAY_CONTENT_KEY:-}
      ANYRAY_CONTENT_MODE: ${ANYRAY_CONTENT_MODE:-encrypted}
      ANYRAY_ALLOW_PLAINTEXT: ${ANYRAY_ALLOW_PLAINTEXT:-false}
    volumes:
      - anyray_attach_optimizer_data:/data
    healthcheck:
      test: wget -qO- http://localhost:8088/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  proxy:
    logging: *default-logging
    image: "${ANYRAY_PROXY_IMAGE:-ghcr.io/anyrayhq/proxy:${ANYRAY_IMAGE_TAG:-v1.10.17}}"
    restart: always
    # optimizer healthy first: nginx auth_request hits optimizer:8088/admin/auth
    # on every console load (attach mode has no gateway) — starting earlier just
    # serves 502s.
    depends_on:
      optimizer:
        condition: service_healthy
    ports:
      - "${ANYRAY_CONSOLE_BIND:-0.0.0.0}:3000:80"
    volumes:
      # Mount the attach-mode nginx config over the baked default.
      - ./attach/nginx.conf:/etc/nginx/templates/default.conf.template:ro

  # model-seeder intentionally absent — no gateway spend store in attach mode.

  # Postgres — the Anyray trace store the optimizer's /v1/record writes to
  # (content-free; any stored content is AES-256-GCM encrypted at rest). The
  # anyray_traces / anyray_observations tables are auto-created on first use.
  postgres:
    logging: *default-logging
    image: "${ANYRAY_POSTGRES_IMAGE:-docker.io/postgres:17}"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?run ./setup.sh first}
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    volumes:
      - anyray_attach_postgres_data:/var/lib/postgresql/data

volumes:
  anyray_attach_optimizer_data:
  anyray_attach_postgres_data:
