name: anyray

# Anyray from published images. Generate secrets first: ./setup.sh
# Console → http://<host>:3000   |   Gateway API → http://<host>:8787
# Docs → https://docs.anyray.ai
#
# Only ports 3000 and 8787 are exposed. Open them to your org network only.

# Bound every container's JSON log so a chatty service can't fill the disk.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  gateway:
    logging: *default-logging
    image: "${ANYRAY_GATEWAY_IMAGE:-public.ecr.aws/h4e6s7a8/gateway:${ANYRAY_IMAGE_TAG:-latest}}"
    # Re-pull the moving tag on every `up`; never run a cached older image.
    pull_policy: always
    restart: always
    # Watched by the opt-in updater (the `updater` service below, --profile
    # updater) — never the datastores or anything else on the host. No-op unless
    # the updater profile is started.
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      - postgres
      - optimizer
    ports:
      - "${ANYRAY_GATEWAY_BIND:-0.0.0.0}:8787:8787"
    environment:
      # Trace store: the gateway persists content-free traces + observations to
      # Postgres (anyray_traces / anyray_observations, auto-created; content
      # AES-256-GCM encrypted at rest). Falls back to ANYRAY_SPEND_DB_URL if unset.
      ANYRAY_OBSERVABILITY_DB_URL: ${ANYRAY_OBSERVABILITY_DB_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-}@postgres:5432/postgres}
      # Durable spend store — Postgres (required; the gateway no longer writes a
      # JSONL file and refuses to start without this). Defaults to the bundled
      # Postgres (same DB as the trace store above); the anyray_spend table is
      # auto-created. Override to point at an external Postgres.
      ANYRAY_SPEND_DB_URL: ${ANYRAY_SPEND_DB_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-}@postgres:5432/postgres}
      # One-time migration off the old file store: set true for one boot to import
      # a legacy spend.jsonl (under ANYRAY_DATA_DIR) into Postgres; no-ops once the
      # table has rows.
      ANYRAY_SPEND_IMPORT_JSONL: ${ANYRAY_SPEND_IMPORT_JSONL:-}
      ANYRAY_OPTIMIZER_URL: http://optimizer:8088
      ANYRAY_OPTIMIZER_TOKEN: ${ANYRAY_OPTIMIZER_TOKEN:?run ./setup.sh first}
      ANYRAY_OPTIMIZER_TIMEOUT_MS: ${ANYRAY_OPTIMIZER_TIMEOUT_MS:-800}
      ANYRAY_OPTIMIZER_VISION_TIMEOUT_MS: ${ANYRAY_OPTIMIZER_VISION_TIMEOUT_MS:-10000}
      # Model the `anyray-default` routing sentinel resolves to. Set it to a model
      # your configured provider serves (a bare model is read under `anthropic`).
      ANYRAY_DEFAULT_MODEL: ${ANYRAY_DEFAULT_MODEL:-anthropic/claude-sonnet-4-5}
      ANYRAY_CONTENT_KEY: ${ANYRAY_CONTENT_KEY:?run ./setup.sh first}
      ANYRAY_CONTENT_MODE: ${ANYRAY_CONTENT_MODE:-encrypted}
      ANYRAY_ALLOW_PLAINTEXT: ${ANYRAY_ALLOW_PLAINTEXT:-false}
      ANYRAY_ADMIN_TOKEN: ${ANYRAY_ADMIN_TOKEN:?run ./setup.sh first}
      ANYRAY_PROVIDER_KEY_OPENAI: ${ANYRAY_PROVIDER_KEY_OPENAI:-}
      ANYRAY_PROVIDER_KEY_ANTHROPIC: ${ANYRAY_PROVIDER_KEY_ANTHROPIC:-}
      ANYRAY_PROVIDER_KEY_AZURE_OPENAI: ${ANYRAY_PROVIDER_KEY_AZURE_OPENAI:-}
      # All runtime-state files (settings, spend, provider/client keys, routing,
      # user caps, audit logs, GDPR log, entitlement lease) live under one
      # directory on the volume. Set ANYRAY_DATA_DIR and the gateway derives
      # every path from it; override an individual file with its ANYRAY_*_FILE
      # var only if you need to (the per-file var wins).
      ANYRAY_DATA_DIR: /data
      # /v1/* is always restricted to verified developers (a minted client key),
      # with the bound identity authoritative — secure-by-default, no toggle.
      # Optional hardening / features — set in .env to enable.
      ANYRAY_HSTS: ${ANYRAY_HSTS:-}
      ANYRAY_RATE_LIMIT_RPM: ${ANYRAY_RATE_LIMIT_RPM:-}
      ANYRAY_RATE_LIMIT_IP_RPM: ${ANYRAY_RATE_LIMIT_IP_RPM:-}
      ANYRAY_RATE_LIMIT_UNAUTH_RPM: ${ANYRAY_RATE_LIMIT_UNAUTH_RPM:-}
      ANYRAY_MAX_CONCURRENT_REQUESTS: ${ANYRAY_MAX_CONCURRENT_REQUESTS:-}
      ANYRAY_AUTH_FAIL_LIMIT: ${ANYRAY_AUTH_FAIL_LIMIT:-}
      ANYRAY_MAX_BODY_BYTES: ${ANYRAY_MAX_BODY_BYTES:-}
      ANYRAY_TRUST_PROXY: ${ANYRAY_TRUST_PROXY:-}
      ANYRAY_CUSTOM_HOST_ALLOWLIST: ${ANYRAY_CUSTOM_HOST_ALLOWLIST:-}
      TRUSTED_CUSTOM_HOSTS: ${TRUSTED_CUSTOM_HOSTS:-}
      # On-top mode: seed the default routing config from an existing upstream
      # gateway so clients send no x-anyray-config header (./setup.sh --upstream).
      ANYRAY_UPSTREAM_URL: ${ANYRAY_UPSTREAM_URL:-}
      # Anyray Portal metering (content-free rollups only) — ON by default; every
      # deployment connects. setup.sh --connect writes the deployment token + salt
      # to .env. The vendor verify key and the control-plane host are PINNED in the
      # gateway image, so there is no license key to configure here. (Without a
      # deployment token the gateway serves through the first-boot grace window,
      # then blocks /v1 until a token is wired — run ./setup.sh --connect <adt_…>.)
      ANYRAY_METERING_ENABLED: ${ANYRAY_METERING_ENABLED:-true}
      ANYRAY_CONTROL_PLANE_URL: ${ANYRAY_CONTROL_PLANE_URL:-}
      ANYRAY_DEPLOYMENT_TOKEN: ${ANYRAY_DEPLOYMENT_TOKEN:-}
      ANYRAY_PSEUDONYM_SALT: ${ANYRAY_PSEUDONYM_SALT:-}
      ANYRAY_GATEWAY_PUBLIC_URL: ${ANYRAY_GATEWAY_PUBLIC_URL:-}
      ANYRAY_CONSOLE_PUBLIC_URL: ${ANYRAY_CONSOLE_PUBLIC_URL:-}
      ANYRAY_METERING_INTERVAL_MS: ${ANYRAY_METERING_INTERVAL_MS:-}
      ANYRAY_ENTITLEMENT_GRACE_MS: ${ANYRAY_ENTITLEMENT_GRACE_MS:-}
      # Dev/staging ONLY — override the pinned key + host for an internal build.
      ANYRAY_DEV_UNSAFE_CONTROL_PLANE: ${ANYRAY_DEV_UNSAFE_CONTROL_PLANE:-}
      ANYRAY_LICENSE_PUBLIC_KEY: ${ANYRAY_LICENSE_PUBLIC_KEY:-}
    volumes:
      - anyray_gateway_data:/data
    healthcheck:
      test: wget -qO- http://localhost:8787/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  optimizer:
    logging: *default-logging
    image: "${ANYRAY_OPTIMIZER_IMAGE:-public.ecr.aws/h4e6s7a8/optimizer:${ANYRAY_IMAGE_TAG:-latest}}"
    pull_policy: always
    restart: always
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      PORT: 8088
      ANYRAY_OPTIMIZER_TOKEN: ${ANYRAY_OPTIMIZER_TOKEN:?run ./setup.sh first}
      ANYRAY_ADMIN_TOKEN: ${ANYRAY_ADMIN_TOKEN:?run ./setup.sh first}
      # Runtime-mutable strategy config + audit log under ANYRAY_DATA_DIR; the
      # runtime config starts empty and is seeded from the image-baked
      # optimizer.config.json until the first admin edit writes here.
      ANYRAY_DATA_DIR: /data
    volumes:
      - anyray_optimizer_data:/data
    healthcheck:
      test: wget -qO- http://localhost:8088/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  proxy:
    logging: *default-logging
    image: "${ANYRAY_PROXY_IMAGE:-public.ecr.aws/h4e6s7a8/proxy:${ANYRAY_IMAGE_TAG:-latest}}"
    pull_policy: always
    restart: always
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    # The proxy image bakes nginx.conf, which carries the gated updater trigger
    # route (/admin/update/run). It is substituted into it at start (envsubst):
    # ANYRAY_UPDATER_TOKEN is injected as the Watchtower bearer server-side (never
    # reaches the browser). One-click is always on (the console always shows the
    # button); the token defaults to the admin key, so the trigger the proxy
    # injects matches Watchtower's expected token with no extra setup.
    environment:
      ANYRAY_UPDATER_TOKEN: ${ANYRAY_UPDATER_TOKEN:-${ANYRAY_ADMIN_TOKEN}}
    # gateway healthy first: nginx auth_request hits gateway:8787 on every
    # console load — starting earlier just serves 502s.
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "${ANYRAY_CONSOLE_BIND:-0.0.0.0}:3000:80"

  # TLS edge for public exposure — only started with `--profile public`.
  # Set ANYRAY_PUBLIC_DOMAIN in .env and ANYRAY_GATEWAY_BIND=127.0.0.1 so the
  # only public entry is Caddy on 443; the Caddyfile 403s the admin surface.
  caddy:
    logging: *default-logging
    image: "${ANYRAY_CADDY_IMAGE:-caddy:2-alpine}"
    profiles: ["public"]
    restart: always
    depends_on:
      - gateway
    ports:
      - "${ANYRAY_HTTP_BIND:-0.0.0.0}:80:80"
      - "${ANYRAY_HTTPS_BIND:-0.0.0.0}:443:443"
    environment:
      ANYRAY_PUBLIC_DOMAIN: ${ANYRAY_PUBLIC_DOMAIN:-}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - anyray_caddy_data:/data
      - anyray_caddy_config:/config

  # Postgres — the Anyray spend + trace store (both content-free; any stored
  # content is AES-256-GCM encrypted at rest). The anyray_traces /
  # anyray_observations tables are auto-created on first use.
  postgres:
    logging: *default-logging
    image: "${ANYRAY_POSTGRES_IMAGE:-docker.io/postgres:17}"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?run ./setup.sh first}
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    volumes:
      - anyray_postgres_data:/var/lib/postgresql/data

  # ── Updater: one-click update for the Anyray images ─────────────────────────
  # Always on — the console's "Update now" button works with no setup, and there
  # is no toggle to disable it. The token the trigger needs derives from
  # ANYRAY_ADMIN_TOKEN (override with ANYRAY_UPDATER_TOKEN).
  # Bundles Watchtower to pull newer images and recreate the Anyray app
  # containers (gateway/optimizer/proxy) when the operator clicks the console's
  # "Update now" button (Watchtower HTTP API). Updates apply only on that click —
  # there is no unattended polling.
  #
  # Uses the moving latest channel by default so there is a newer digest to roll
  # forward to. Override ANYRAY_IMAGE_TAG=vX.Y.Z when you want pinned/manual
  # updates. Watchtower only touches containers labelled
  # com.centurylinklabs.watchtower.enable=true (the three app services above),
  # never the datastores or anything else on the host.
  #
  # SECURITY: Watchtower never gets the raw Docker socket — it talks to the
  # docker-socket-proxy below, which exposes only the minimal Docker API needed
  # to pull + recreate containers. The HTTP API is in-network only (no published
  # port) and the trigger is gated by the console admin key (the proxy injects
  # the updater token server-side). The socket is root-equivalent on the host, so
  # the proxy stays least-privilege — see docs.anyray.ai → Security → Updates and
  # the Docker socket.
  docker-socket-proxy:
    logging: *default-logging
    image: "${ANYRAY_DOCKER_SOCKET_PROXY_IMAGE:-tecnativa/docker-socket-proxy}"
    restart: always
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  updater:
    logging: *default-logging
    image: "${ANYRAY_UPDATER_IMAGE:-ghcr.io/nicholas-fedor/watchtower:1.18.1}"
    restart: always
    depends_on:
      - docker-socket-proxy
    command: --label-enable --cleanup
    environment:
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_TOKEN: ${ANYRAY_UPDATER_TOKEN:-${ANYRAY_ADMIN_TOKEN}}
      WATCHTOWER_INCLUDE_RESTARTING: "true"

volumes:
  anyray_gateway_data:
  anyray_optimizer_data:
  anyray_postgres_data:
  anyray_caddy_data:
  anyray_caddy_config:
