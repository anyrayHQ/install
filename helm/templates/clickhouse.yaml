{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "anyray.fullname" . }}-clickhouse-config
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
data:
  # Mirror of docker-compose clickhouse/config.d/log-retention.xml (vendored from
  # monorepo). Bounds ClickHouse's own diagnostics so they can't fill the PVC:
  # its profiler + verbose logs ship with no TTL and grew unbounded to ~5GB.
  log-retention.xml: |
    <?xml version="1.0"?>
    <clickhouse>
        <logger>
            <level>warning</level>
            <size>50M</size>
            <count>3</count>
        </logger>
        <trace_log><ttl>event_date + INTERVAL 3 DAY DELETE</ttl></trace_log>
        <text_log><ttl>event_date + INTERVAL 3 DAY DELETE</ttl></text_log>
        <metric_log><ttl>event_date + INTERVAL 3 DAY DELETE</ttl></metric_log>
        <asynchronous_metric_log><ttl>event_date + INTERVAL 3 DAY DELETE</ttl></asynchronous_metric_log>
        <part_log><ttl>event_date + INTERVAL 3 DAY DELETE</ttl></part_log>
        <query_log><ttl>event_date + INTERVAL 3 DAY DELETE</ttl></query_log>
        <query_metric_log><ttl>event_date + INTERVAL 3 DAY DELETE</ttl></query_metric_log>
        <background_schedule_pool_log><ttl>event_date + INTERVAL 3 DAY DELETE</ttl></background_schedule_pool_log>
    </clickhouse>
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "anyray.fullname" . }}-clickhouse
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  serviceName: {{ include "anyray.fullname" . }}-clickhouse
  replicas: 1
  selector:
    matchLabels:
      {{- include "anyray.selectorLabels" (dict "component" "clickhouse" "context" .) | nindent 6 }}
  template:
    metadata:
      {{- include "anyray.podMetadata" (dict "component" "clickhouse" "context" .) | nindent 6 }}
    spec:
      {{- include "anyray.podSpecCommonNoSecurity" (dict "component" "clickhouse" "context" .) | nindent 6 }}
      {{- with .Values.clickhouse.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: clickhouse
          image: {{ include "anyray.image" (dict "component" "clickhouse" "context" .) }}
          imagePullPolicy: {{ include "anyray.imagePullPolicy" (dict "component" "clickhouse" "context" .) }}
          {{- include "anyray.containerSecurityContext" . | nindent 10 }}
          env:
            - name: CLICKHOUSE_DB
              value: default
            - name: CLICKHOUSE_USER
              value: clickhouse
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "CLICKHOUSE_PASSWORD" "context" .) | nindent 16 }}
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: logs
              mountPath: /var/log/clickhouse-server
            - name: config
              mountPath: /etc/clickhouse-server/config.d/log-retention.xml
              subPath: log-retention.xml
      volumes:
        - name: config
          configMap:
            name: {{ include "anyray.fullname" . }}-clickhouse-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.clickhouse.storageClass }}
        storageClassName: {{ .Values.clickhouse.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.storage }}
    - metadata:
        name: logs
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.clickhouse.storageClass }}
        storageClassName: {{ .Values.clickhouse.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "anyray.fullname" . }}-clickhouse
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "anyray.selectorLabels" (dict "component" "clickhouse" "context" .) | nindent 4 }}
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
{{- end }}
