apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "anyray.fullname" . }}-gateway
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  {{- if .Values.gateway.persistence.enabled }}
  {{- if gt (int .Values.gateway.replicas) 1 }}
  {{- fail "gateway.replicas > 1 needs gateway.persistence.enabled=false: the data PVC is ReadWriteOnce" }}
  {{- end }}
  # Recreate: the RWO volume must detach before the replacement pod can mount it
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "anyray.selectorLabels" (dict "component" "gateway" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "anyray.selectorLabels" (dict "component" "gateway" "context" .) | nindent 8 }}
    spec:
      containers:
        - name: gateway
          image: ghcr.io/anyrayhq/gateway:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ANYRAY_OBSERVABILITY_BASEURL
              value: "http://web:3000"
            - name: ANYRAY_OBSERVABILITY_PUBLIC_KEY
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_OBSERVABILITY_PUBLIC_KEY" "context" .) | nindent 16 }}
            - name: ANYRAY_OBSERVABILITY_SECRET_KEY
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_OBSERVABILITY_SECRET_KEY" "context" .) | nindent 16 }}
            - name: ANYRAY_OPTIMIZER_URL
              value: "http://optimizer:8088"
            - name: ANYRAY_OPTIMIZER_TOKEN
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_OPTIMIZER_TOKEN" "context" .) | nindent 16 }}
            - name: ANYRAY_OPTIMIZER_TIMEOUT_MS
              value: {{ .Values.gateway.optimizerTimeoutMs | quote }}
            - name: ANYRAY_OPTIMIZER_VISION_TIMEOUT_MS
              value: {{ .Values.gateway.optimizerVisionTimeoutMs | quote }}
            - name: ANYRAY_CONTENT_KEY
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_CONTENT_KEY" "context" .) | nindent 16 }}
            - name: ANYRAY_CONTENT_MODE
              value: {{ .Values.gateway.contentMode | quote }}
            - name: ANYRAY_ALLOW_PLAINTEXT
              value: {{ .Values.gateway.allowPlaintext | quote }}
            - name: ANYRAY_ADMIN_TOKEN
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_ADMIN_TOKEN" "context" .) | nindent 16 }}
            - name: ANYRAY_SETTINGS_FILE
              value: /data/anyray-settings.json
            - name: ANYRAY_AUDIT_FILE
              value: /data/anyray-settings-audit.log
            - name: ANYRAY_SPEND_FILE
              value: /data/spend.jsonl
            - name: ANYRAY_PROVIDER_KEYS_FILE
              value: /data/provider-keys.config.json
            - name: ANYRAY_PROVIDER_KEYS_AUDIT_FILE
              value: /data/provider-keys-audit.log
            - name: ANYRAY_ROUTING_CONFIG_FILE
              value: /data/routing.config.json
            - name: ANYRAY_ROUTING_CONFIG_AUDIT_FILE
              value: /data/routing-config-audit.log
            - name: ANYRAY_PRICING_CONFIG
              value: /data/pricing.config.json
            - name: ANYRAY_PRICING_AUDIT_FILE
              value: /data/pricing-settings-audit.log
            - name: ANYRAY_CLIENT_KEYS_FILE
              value: /data/client-keys.config.json
            - name: ANYRAY_CLIENT_KEYS_AUDIT_FILE
              value: /data/client-keys-audit.log
            - name: ANYRAY_USER_CAPS_FILE
              value: /data/user-caps.config.json
            - name: ANYRAY_USER_CAPS_AUDIT_FILE
              value: /data/user-caps-audit.log
            - name: ANYRAY_ENTITLEMENT_FILE
              value: /data/entitlement.lease.json
            {{- with .Values.gateway.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 8787
          readinessProbe:
            httpGet:
              path: /
              port: 8787
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.gateway.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "anyray.fullname" . }}-gateway-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.gateway.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "anyray.fullname" . }}-gateway-data
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  annotations:
    # survive helm uninstall — this volume holds provider keys and spend history
    "helm.sh/resource-policy": keep
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.gateway.persistence.storageClass }}
  storageClassName: {{ .Values.gateway.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.gateway.persistence.size }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  # Bare name: nginx in the proxy image hardcodes the upstream `gateway:8787`.
  name: gateway
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    {{- include "anyray.selectorLabels" (dict "component" "gateway" "context" .) | nindent 4 }}
  ports:
    - port: 8787
      targetPort: 8787
