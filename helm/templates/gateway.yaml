apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "anyray.fullname" . }}-gateway
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  {{- if .Values.gateway.persistence.enabled }}
  {{- if gt (int .Values.gateway.replicas) 1 }}
  {{- fail "gateway.replicas > 1 needs gateway.persistence.enabled=false: the data PVC is ReadWriteOnce" }}
  {{- end }}
  # Recreate: the RWO volume must detach before the replacement pod can mount it
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "anyray.selectorLabels" (dict "component" "gateway" "context" .) | nindent 6 }}
  template:
    metadata:
      {{- include "anyray.podMetadata" (dict "component" "gateway" "context" .) | nindent 6 }}
    spec:
      {{- include "anyray.podSpecCommon" (dict "component" "gateway" "context" .) | nindent 6 }}
      containers:
        - name: gateway
          image: {{ include "anyray.image" (dict "component" "gateway" "context" .) }}
          imagePullPolicy: {{ include "anyray.imagePullPolicy" (dict "component" "gateway" "context" .) }}
          {{- include "anyray.containerSecurityContext" . | nindent 10 }}
          env:
            {{- include "anyray.observabilityDbEnv" . | nindent 12 }}
            - name: ANYRAY_OPTIMIZER_URL
              value: "http://optimizer:8088"
            - name: ANYRAY_OPTIMIZER_TOKEN
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_OPTIMIZER_TOKEN" "context" .) | nindent 16 }}
            - name: ANYRAY_OPTIMIZER_TIMEOUT_MS
              value: {{ .Values.gateway.optimizerTimeoutMs | quote }}
            - name: ANYRAY_OPTIMIZER_VISION_TIMEOUT_MS
              value: {{ .Values.gateway.optimizerVisionTimeoutMs | quote }}
            {{- with .Values.gateway.defaultModel }}
            # What `anyray-default` routes to when a request names no model;
            # without it the gateway falls back to a stale alias and 404s.
            - name: ANYRAY_DEFAULT_MODEL
              value: {{ . | quote }}
            {{- end }}
            - name: ANYRAY_CONTENT_KEY
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_CONTENT_KEY" "context" .) | nindent 16 }}
            - name: ANYRAY_CONTENT_MODE
              value: {{ .Values.gateway.contentMode | quote }}
            - name: ANYRAY_ALLOW_PLAINTEXT
              value: {{ .Values.gateway.allowPlaintext | quote }}
            - name: ANYRAY_ADMIN_TOKEN
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_ADMIN_TOKEN" "context" .) | nindent 16 }}
            # All runtime-state files (settings, spend, provider/client keys,
            # routing, user caps, audit logs, GDPR log, entitlement lease) live
            # under one directory on the volume; the gateway derives every path
            # from ANYRAY_DATA_DIR. Override an individual file with its
            # ANYRAY_*_FILE var only if you need to (the per-file var wins).
            - name: ANYRAY_DATA_DIR
              value: /data
            {{- if .Values.gateway.metering.enabled }}
            # Anyray Cloud metering. The deployment token + pseudonym salt come from
            # the Secret (folded in by setup.sh --connect); the control-plane host and
            # verify key are pinned in the gateway image, so they are not set here.
            # optional: true keeps the pod up if a key is missing — the gateway then
            # logs "metering enabled but not configured" instead of crashlooping.
            - name: ANYRAY_METERING_ENABLED
              value: "true"
            - name: ANYRAY_DEPLOYMENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: ANYRAY_DEPLOYMENT_TOKEN
                  optional: true
            - name: ANYRAY_PSEUDONYM_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: ANYRAY_PSEUDONYM_SALT
                  optional: true
            - name: ANYRAY_METERING_INTERVAL_MS
              value: {{ .Values.gateway.metering.intervalMs | quote }}
            - name: ANYRAY_ENTITLEMENT_GRACE_MS
              value: {{ .Values.gateway.metering.graceMs | quote }}
            {{- end }}
            {{- with .Values.gateway.upstreamUrl }}
            - name: ANYRAY_UPSTREAM_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.customHostAllowlist }}
            - name: ANYRAY_CUSTOM_HOST_ALLOWLIST
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.trustedCustomHosts }}
            - name: TRUSTED_CUSTOM_HOSTS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.publicUrl }}
            - name: ANYRAY_GATEWAY_PUBLIC_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.consolePublicUrl }}
            - name: ANYRAY_CONSOLE_PUBLIC_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.requireClientKeys }}
            - name: ANYRAY_REQUIRE_CLIENT_KEYS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.requireVerifiedDev }}
            - name: ANYRAY_REQUIRE_VERIFIED_DEV
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.hsts }}
            - name: ANYRAY_HSTS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.trustProxy }}
            - name: ANYRAY_TRUST_PROXY
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.rateLimitRpm }}
            - name: ANYRAY_RATE_LIMIT_RPM
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.rateLimitUnauthRpm }}
            - name: ANYRAY_RATE_LIMIT_UNAUTH_RPM
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.authFailLimit }}
            - name: ANYRAY_AUTH_FAIL_LIMIT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.maxBodyBytes }}
            - name: ANYRAY_MAX_BODY_BYTES
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 8787
          readinessProbe:
            httpGet:
              path: /
              port: 8787
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.gateway.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "anyray.fullname" . }}-gateway-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.gateway.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "anyray.fullname" . }}-gateway-data
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  annotations:
    # survive helm uninstall — this volume holds provider keys and spend history
    "helm.sh/resource-policy": keep
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.gateway.persistence.storageClass }}
  storageClassName: {{ .Values.gateway.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.gateway.persistence.size }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  # Bare name: nginx in the proxy image hardcodes the upstream `gateway:8787`.
  name: gateway
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  {{- with .Values.gateway.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    {{- include "anyray.selectorLabels" (dict "component" "gateway" "context" .) | nindent 4 }}
  ports:
    - port: 8787
      targetPort: 8787
      {{- with .Values.gateway.service.nodePort }}
      nodePort: {{ . }}
      {{- end }}
