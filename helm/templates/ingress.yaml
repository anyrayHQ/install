{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "anyray.fullname" . }}
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- $hosts := .Values.ingress.hosts }}
    {{- if not $hosts }}
    {{- $hosts = list (dict "host" .Values.host "paths" (dict "console" "/" "gateway" "/v1" "admin" "/admin")) }}
    {{- end }}
    {{- range $entry := $hosts }}
    {{- $paths := default dict $entry.paths }}
    {{- $host := default $.Values.host $entry.host }}
    {{- if not $host }}
    {{- fail "ingress.enabled=true requires host or ingress.hosts[].host" }}
    {{- end }}
    - host: {{ $host }}
      http:
        paths:
          - path: {{ default "/" $paths.console }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "anyray.fullname" $ }}-proxy
                port:
                  number: 3000
          - path: {{ default "/v1" $paths.gateway }}
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8787
          - path: {{ default "/admin" $paths.admin }}
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8787
    {{- end }}
{{- end }}
