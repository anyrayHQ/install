apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "anyray.fullname" . }}-model-seeder
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: model-seeder
  annotations:
    # Rerun after upgrade: kubectl delete job anyray-model-seeder && helm upgrade ...
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "anyray.selectorLabels" (dict "component" "model-seeder" "context" .) | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: model-seeder
          image: docker.io/library/node:20-alpine
          command: ["node", "/seed/seedModelPrices.mjs"]
          env:
            - name: ANYRAY_OBSERVABILITY_BASEURL
              value: "http://{{ include "anyray.fullname" . }}-web:3000"
            - name: ANYRAY_OBSERVABILITY_PUBLIC_KEY
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_OBSERVABILITY_PUBLIC_KEY" "context" .) | nindent 16 }}
            - name: ANYRAY_OBSERVABILITY_SECRET_KEY
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_OBSERVABILITY_SECRET_KEY" "context" .) | nindent 16 }}
          volumeMounts:
            - name: seed
              mountPath: /seed
      volumes:
        - name: seed
          configMap:
            name: {{ include "anyray.fullname" . }}-model-seeder-script
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "anyray.fullname" . }}-model-seeder-script
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: model-seeder
data:
  seedModelPrices.mjs: |
    {{- .Files.Get "files/seedModelPrices.mjs" | nindent 4 }}
