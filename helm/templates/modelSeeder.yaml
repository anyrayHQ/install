apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "anyray.fullname" . }}-model-seeder
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: model-seeder
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      {{- include "anyray.podMetadata" (dict "component" "model-seeder" "context" .) | nindent 6 }}
    spec:
      {{- include "anyray.podSpecCommon" (dict "component" "modelSeeder" "context" .) | nindent 6 }}
      restartPolicy: OnFailure
      containers:
        - name: model-seeder
          image: {{ include "anyray.image" (dict "component" "modelSeeder" "context" .) }}
          imagePullPolicy: {{ include "anyray.imagePullPolicy" (dict "component" "modelSeeder" "context" .) }}
          {{- include "anyray.containerSecurityContext" . | nindent 10 }}
          command: ["node", "/seed/seedModelPrices.mjs"]
          env:
            - name: ANYRAY_OBSERVABILITY_BASEURL
              value: "http://web:3000"
            - name: ANYRAY_OBSERVABILITY_PUBLIC_KEY
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_OBSERVABILITY_PUBLIC_KEY" "context" .) | nindent 16 }}
            - name: ANYRAY_OBSERVABILITY_SECRET_KEY
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_OBSERVABILITY_SECRET_KEY" "context" .) | nindent 16 }}
          volumeMounts:
            - name: seed
              mountPath: /seed
      volumes:
        - name: seed
          configMap:
            name: {{ include "anyray.fullname" . }}-model-seeder-script
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "anyray.fullname" . }}-model-seeder-script
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: model-seeder
data:
  seedModelPrices.mjs: |
    {{- .Files.Get "files/seedModelPrices.mjs" | nindent 4 }}
