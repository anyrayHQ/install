apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "anyray.fullname" . }}-optimizer
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: optimizer
spec:
  replicas: {{ .Values.optimizer.replicas }}
  {{- if .Values.optimizer.persistence.enabled }}
  {{- if gt (int .Values.optimizer.replicas) 1 }}
  {{- fail "optimizer.replicas > 1 needs optimizer.persistence.enabled=false: the data PVC is ReadWriteOnce" }}
  {{- end }}
  # Recreate: the RWO volume must detach before the replacement pod can mount it
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "anyray.selectorLabels" (dict "component" "optimizer" "context" .) | nindent 6 }}
  template:
    metadata:
      {{- include "anyray.podMetadata" (dict "component" "optimizer" "context" .) | nindent 6 }}
    spec:
      {{- include "anyray.podSpecCommon" . | nindent 6 }}
      containers:
        - name: optimizer
          image: {{ include "anyray.image" (dict "component" "optimizer" "context" .) }}
          imagePullPolicy: {{ include "anyray.imagePullPolicy" (dict "component" "optimizer" "context" .) }}
          {{- include "anyray.containerSecurityContext" . | nindent 10 }}
          env:
            - name: PORT
              value: "8088"
            - name: ANYRAY_OPTIMIZER_TOKEN
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_OPTIMIZER_TOKEN" "context" .) | nindent 16 }}
            - name: ANYRAY_ADMIN_TOKEN
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_ADMIN_TOKEN" "context" .) | nindent 16 }}
            - name: ANYRAY_OPTIMIZER_CONFIG
              value: /data/optimizer.config.json
            - name: ANYRAY_OPTIMIZER_AUDIT_FILE
              value: /data/optimizer-settings-audit.log
            {{- with .Values.optimizer.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 8088
          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.optimizer.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.optimizer.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "anyray.fullname" . }}-optimizer-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.optimizer.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "anyray.fullname" . }}-optimizer-data
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: optimizer
  annotations:
    "helm.sh/resource-policy": keep
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.optimizer.persistence.storageClass }}
  storageClassName: {{ .Values.optimizer.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.optimizer.persistence.size }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  # Bare name: nginx in the proxy image hardcodes the upstream `optimizer:8088`.
  name: optimizer
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: optimizer
spec:
  type: ClusterIP
  selector:
    {{- include "anyray.selectorLabels" (dict "component" "optimizer" "context" .) | nindent 4 }}
  ports:
    - port: 8088
      targetPort: 8088
