apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "anyray.fullname" . }}-postgres
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "anyray.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "anyray.selectorLabels" (dict "component" "postgres" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "anyray.selectorLabels" (dict "component" "postgres" "context" .) | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: docker.io/postgres:17
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "POSTGRES_PASSWORD" "context" .) | nindent 16 }}
            - name: TZ
              value: UTC
            - name: PGTZ
              value: UTC
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storageClass }}
        storageClassName: {{ .Values.postgres.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "anyray.fullname" . }}-postgres
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "anyray.selectorLabels" (dict "component" "postgres" "context" .) | nindent 4 }}
  ports:
    - port: 5432
      targetPort: 5432
