apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "anyray.fullname" . }}-proxy
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  replicas: {{ .Values.proxy.replicas }}
  selector:
    matchLabels:
      {{- include "anyray.selectorLabels" (dict "component" "proxy" "context" .) | nindent 6 }}
  template:
    metadata:
      {{- include "anyray.podMetadata" (dict "component" "proxy" "context" .) | nindent 6 }}
    spec:
      {{- include "anyray.podSpecCommon" (dict "component" "proxy" "context" .) | nindent 6 }}
      containers:
        - name: proxy
          image: {{ include "anyray.image" (dict "component" "proxy" "context" .) }}
          imagePullPolicy: {{ include "anyray.imagePullPolicy" (dict "component" "proxy" "context" .) }}
          {{- include "anyray.containerSecurityContext" . | nindent 10 }}
          # The proxy image bakes an nginx template whose ANYRAY_UPDATER_*
          # placeholders are envsubst-substituted at start; if they are unset
          # nginx keeps the literal "$..." and aborts with `unknown variable`.
          # The one-click self-updater is Docker/Watchtower-only (it drives the
          # host docker socket), so it is hard-disabled here — Kubernetes
          # upgrades go through `helm upgrade` — but the vars must still be
          # present so the baked template renders and nginx can start.
          env:
            - name: ANYRAY_UPDATER_ENABLED
              value: "false"
            - name: ANYRAY_UPDATER_TOKEN
              value: ""
            - name: ANYRAY_UPDATER_PERIODIC_POLLS
              value: "false"
            - name: ANYRAY_UPDATER_POLL_INTERVAL
              value: "86400"
            # The running tag (movingTag is moot here since one-click is off) and
            # the manual upgrade command the console shows. On Kubernetes that is
            # `helm upgrade`, not the Docker-Compose command the image defaults to.
            - name: ANYRAY_IMAGE_TAG
              value: {{ .Values.image.tag | default "latest" | quote }}
            - name: ANYRAY_UPDATE_HINT
              value: "helm upgrade anyray ./helm --set image.tag=<version>"
            # Point nginx at the gateway/optimizer Services by FQDN. The proxy
            # resolves upstreams at request time via nginx's `resolver`, which —
            # unlike libc/Node — does NOT apply the cluster's DNS search domains.
            # So the image defaults (bare `gateway`/`optimizer`, fine on Docker
            # Compose) resolve to NXDOMAIN here, and every gated route (/console/,
            # /admin/*) 500s when the /__auth subrequest can't reach the gateway
            # ("gateway could not be resolved (3: Host not found)"). The Services
            # are named `gateway`/`optimizer` (see gateway.yaml / optimizer.yaml).
            # Listed before extraEnv so an operator override still wins (last
            # duplicate env entry is the one kubelet keeps).
            - name: ANYRAY_GATEWAY_HOST
              value: "gateway.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}"
            - name: ANYRAY_OPTIMIZER_HOST
              value: "optimizer.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}"
            {{- with .Values.proxy.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /anyray-login
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.proxy.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "anyray.fullname" . }}-proxy
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  type: {{ .Values.proxy.service.type }}
  {{- with .Values.proxy.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    {{- include "anyray.selectorLabels" (dict "component" "proxy" "context" .) | nindent 4 }}
  ports:
    - port: 3000
      targetPort: 80
      {{- with .Values.proxy.service.nodePort }}
      nodePort: {{ . }}
      {{- end }}
