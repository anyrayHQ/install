apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "anyray.fullname" . }}-web
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "anyray.selectorLabels" (dict "component" "web" "context" .) | nindent 6 }}
  template:
    metadata:
      {{- include "anyray.podMetadata" (dict "component" "web" "context" .) | nindent 6 }}
    spec:
      {{- include "anyray.podSpecCommon" (dict "component" "web" "context" .) | nindent 6 }}
      containers:
        - name: web
          image: {{ include "anyray.image" (dict "component" "web" "context" .) }}
          imagePullPolicy: {{ include "anyray.imagePullPolicy" (dict "component" "web" "context" .) }}
          {{- include "anyray.containerSecurityContext" . | nindent 10 }}
          env:
            {{- if .Values.web.nodeOptions }}
            # Pin the V8 heap so the console doesn't OOM during init. Langfuse
            # (Next.js) otherwise sizes old-space from the cgroup limit and capped
            # near ~512MB at the old 1Gi limit, crashlooping init and timing out
            # the post-install model-seeder hook.
            - name: NODE_OPTIONS
              value: {{ .Values.web.nodeOptions | quote }}
            {{- end }}
            - name: NEXTAUTH_URL
              value: {{ default (printf "http://%s:3000" .Values.host) .Values.web.nextauthUrl | quote }}
            - name: NEXTAUTH_SECRET
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "NEXTAUTH_SECRET" "context" .) | nindent 16 }}
            {{- include "anyray.postgresEnv" . | nindent 12 }}
            - name: SALT
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "SALT" "context" .) | nindent 16 }}
            - name: ENCRYPTION_KEY
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ENCRYPTION_KEY" "context" .) | nindent 16 }}
            - name: TELEMETRY_ENABLED
              value: "false"
            {{- include "anyray.clickhouseEnv" . | nindent 12 }}
            {{- include "anyray.objectStorageEnv" . | nindent 12 }}
            {{- include "anyray.redisEnv" . | nindent 12 }}
            - name: LANGFUSE_INIT_ORG_ID
              value: anyray
            - name: LANGFUSE_INIT_ORG_NAME
              value: Anyray
            - name: LANGFUSE_INIT_PROJECT_ID
              value: anyray-gateway
            - name: LANGFUSE_INIT_PROJECT_NAME
              value: Anyray Gateway
            - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_OBSERVABILITY_PUBLIC_KEY" "context" .) | nindent 16 }}
            - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_OBSERVABILITY_SECRET_KEY" "context" .) | nindent 16 }}
            - name: LANGFUSE_INIT_USER_EMAIL
              value: admin@anyray.local
            - name: LANGFUSE_INIT_USER_NAME
              value: Admin
            - name: LANGFUSE_INIT_USER_PASSWORD
              valueFrom:
                {{- include "anyray.secretRef" (dict "key" "ANYRAY_INIT_USER_PASSWORD" "context" .) | nindent 16 }}
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 20
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  # Bare name: nginx in the proxy image hardcodes the upstream `web:3000`.
  name: web
  labels:
    {{- include "anyray.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    {{- include "anyray.selectorLabels" (dict "component" "web" "context" .) | nindent 4 }}
  ports:
    - port: 3000
      targetPort: 3000
