# Anyray Helm chart values.
# Run setup.sh --k8s to generate anyray-secrets.yaml + a starter my-values.yaml,
# then install into your chosen namespace:
#   kubectl apply -n "$ANYRAY_NAMESPACE" -f anyray-secrets.yaml
#   helm install anyray ./helm -f my-values.yaml --namespace "$ANYRAY_NAMESPACE"
# Omit the namespace flags only when you intentionally want the current kubectl/Helm namespace.

# The cluster's external Ingress/LoadBalancer DNS endpoint (console + gateway).
# Required. Must be a hostname, not a node IP — it becomes the Ingress host: rule,
# which matches on the HTTP Host header.
host: ""

image:
  tag: "v1.10.18"
  pullPolicy: IfNotPresent
  pullSecrets: []

# Per-component image repository overrides. Empty app tags inherit image.tag.
images:
  gateway:
    repository: ghcr.io/anyrayhq/gateway
    tag: ""
  optimizer:
    repository: ghcr.io/anyrayhq/optimizer
    tag: ""
  proxy:
    repository: ghcr.io/anyrayhq/proxy
    tag: ""
  postgres:
    repository: docker.io/postgres
    tag: "17"

# Name of the Kubernetes Secret created by: ./setup.sh --k8s
secretName: anyray-secrets

# Common pod/runtime controls. These apply to all workload pods.
serviceAccount:
  create: false
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
containerSecurityContext: {}

# Global scheduling defaults applied to every pod. Each component block below
# (gateway, optimizer, proxy, postgres) can override any of these per workload by
# setting the same key — e.g. pin the Postgres pod to a specific node pool while
# everything else stays on the default. A component-level value REPLACES the
# global for that field (it does not merge), and an unset component value inherits
# the global. All images are multi-arch, so an architecture nodeSelector is only
# needed for deliberate placement, not for the stack to run on mixed arm64/amd64
# nodes. Example:
#   postgres:
#     nodeSelector:
#       kubernetes.io/arch: amd64
#     tolerations:
#       - key: dedicated
#         operator: Equal
#         value: data-plane
#         effect: NoSchedule
nodeSelector: {}
affinity: {}
tolerations: []
topologySpreadConstraints: []
priorityClassName: ""

# Gateway
gateway:
  replicas: 1
  service:
    type: ClusterIP
    # Set for NodePort installs, for example: 30787
    nodePort: null
    # Set for LoadBalancer installs to keep the gateway private to your org/VPN.
    loadBalancerSourceRanges: []
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # Content privacy: encrypted | off
  # Never set to plaintext in production.
  contentMode: encrypted
  allowPlaintext: "false"
  optimizerTimeoutMs: "800"
  optimizerVisionTimeoutMs: "10000"
  # On-top mode: point Anyray at an existing OpenAI-compatible gateway (LiteLLM,
  # OpenRouter, …) so clients send NO per-request x-anyray-config header — the
  # gateway seeds its default routing config from this URL on first boot. For an
  # internal/loopback upstream, also set customHostAllowlist (hostname, no port)
  # and trustedCustomHosts so the host clears the SSRF proxy guard.
  upstreamUrl: ""
  customHostAllowlist: ""
  trustedCustomHosts: ""
  publicUrl: ""
  consolePublicUrl: ""
  requireClientKeys: ""
  requireVerifiedDev: ""
  hsts: ""
  trustProxy: ""
  rateLimitRpm: ""
  rateLimitUnauthRpm: ""
  authFailLimit: ""
  maxBodyBytes: ""
  # Anyray Portal metering. ON by default — every deployment connects for content-free
  # usage metering. `setup.sh --k8s --connect <token>` folds ANYRAY_DEPLOYMENT_TOKEN +
  # ANYRAY_PSEUDONYM_SALT into the Secret. The control-plane host and the vendor verify
  # key are pinned in the gateway image, so they are NOT set here. (With enabled: true
  # but no deployment token in the Secret, the gateway serves through the first-boot
  # grace window, then blocks /v1 until a token is wired.)
  metering:
    enabled: true
    intervalMs: "900000"
    graceMs: "86400000"
  # Extra env vars (provider-key fallbacks, rate limits, …)
  # in plain k8s env syntax: [{name: ANYRAY_RATE_LIMIT_RPM, value: "600"}]
  extraEnv: []
  # Persist /data (provider keys, routing config, spend + audit logs) across
  # pod restarts. Requires replicas: 1 — the PVC is ReadWriteOnce.
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""

# Optimizer
optimizer:
  replicas: 1
  # Persist /data (optimizer config + audit log) across pod restarts.
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  extraEnv: []

# Proxy (nginx reverse proxy / console)
proxy:
  replicas: 1
  service:
    type: ClusterIP
    # Set for NodePort installs, for example: 30000
    nodePort: null
    # Set for LoadBalancer installs to keep the console private to your org/VPN.
    loadBalancerSourceRanges: []
  resources:
    requests:
      cpu: "25m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  extraEnv: []

# Postgres — the Anyray spend + trace store. The gateway persists content-free
# traces + observations to the anyray_traces / anyray_observations tables
# (auto-created on first use; any stored content is AES-256-GCM encrypted at rest)
# and reads them in-process.
postgres:
  enabled: true
  storage: 10Gi
  storageClass: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  external:
    # Point the gateway's trace + spend store at a managed Postgres instead of
    # the bundled StatefulSet (set postgres.enabled=false). The gateway reads this
    # as both ANYRAY_OBSERVABILITY_DB_URL and ANYRAY_SPEND_DB_URL (one DB serves
    # both). Prefer databaseUrlSecretKeyRef in production.
    databaseUrl: ""
    databaseUrlSecretKeyRef: {}
    # name: anyray-external-postgres
    # key: DATABASE_URL

# Ingress — disabled by default; fill in and set enabled: true to expose externally.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  # Optional override for one or more hosts. Leave empty to use `host`.
  # - host: anyray.example.com
  #   paths:
  #     console: /
  #     gateway: /v1
  #     admin: /admin
  # Example annotations for nginx ingress:
  #   kubernetes.io/ingress.class: nginx
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  tls: []
  # - secretName: anyray-tls
  #   hosts:
  #     - anyray.example.com
