# Anyray Helm chart values.
# Run setup.sh --k8s to generate anyray-secrets.yaml + a starter my-values.yaml,
# then install into your chosen namespace:
#   kubectl apply -n "$ANYRAY_NAMESPACE" -f anyray-secrets.yaml
#   helm install anyray ./helm -f my-values.yaml --namespace "$ANYRAY_NAMESPACE"
# Omit the namespace flags only when you intentionally want the current kubectl/Helm namespace.

# The cluster's external Ingress/LoadBalancer DNS endpoint (console + gateway).
# Required. Must be a hostname, not a node IP — it becomes the Ingress host: rule,
# which matches on the HTTP Host header.
host: ""

image:
  tag: "v1.10.10"
  pullPolicy: IfNotPresent
  pullSecrets: []

# Per-component image repository overrides. Empty app tags inherit image.tag.
images:
  gateway:
    repository: ghcr.io/anyrayhq/gateway
    tag: ""
  optimizer:
    repository: ghcr.io/anyrayhq/optimizer
    tag: ""
  proxy:
    repository: ghcr.io/anyrayhq/proxy
    tag: ""
  web:
    repository: docker.io/langfuse/langfuse
    tag: "3"
  worker:
    repository: docker.io/langfuse/langfuse-worker
    tag: "3"
  modelSeeder:
    repository: docker.io/library/node
    tag: "20-alpine"
  postgres:
    repository: docker.io/postgres
    tag: "17"
  clickhouse:
    repository: docker.io/clickhouse/clickhouse-server
    tag: "26.3"
  minio:
    repository: cgr.dev/chainguard/minio
    # Chainguard's free tier publishes only :latest, so keep the digest pin.
    tag: "latest@sha256:598136b7ee3ee523d820f341ba04021e22c12c32971d9223a6d8d14134807f07"
  redis:
    repository: docker.io/redis
    tag: "7"

# Name of the Kubernetes Secret created by: ./setup.sh --k8s
secretName: anyray-secrets

# Common pod/runtime controls. These apply to all workload pods unless a template
# has a component-specific security context, such as ClickHouse.
serviceAccount:
  create: false
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
containerSecurityContext: {}
nodeSelector: {}
affinity: {}
tolerations: []
topologySpreadConstraints: []
priorityClassName: ""

# Gateway
gateway:
  replicas: 1
  service:
    type: ClusterIP
    # Set for NodePort installs, for example: 30787
    nodePort: null
    # Set for LoadBalancer installs to keep the gateway private to your org/VPN.
    loadBalancerSourceRanges: []
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # Content privacy: encrypted | off
  # Never set to plaintext in production.
  contentMode: encrypted
  allowPlaintext: "false"
  optimizerTimeoutMs: "800"
  optimizerVisionTimeoutMs: "10000"
  # On-top mode: point Anyray at an existing OpenAI-compatible gateway (LiteLLM,
  # OpenRouter, …) so clients send NO per-request x-anyray-config header — the
  # gateway seeds its default routing config from this URL on first boot. For an
  # internal/loopback upstream, also set customHostAllowlist (hostname, no port)
  # and trustedCustomHosts so the host clears the SSRF proxy guard.
  upstreamUrl: ""
  customHostAllowlist: ""
  trustedCustomHosts: ""
  publicUrl: ""
  consolePublicUrl: ""
  requireClientKeys: ""
  requireVerifiedDev: ""
  hsts: ""
  trustProxy: ""
  responsesOptimize: ""
  rateLimitRpm: ""
  rateLimitUnauthRpm: ""
  authFailLimit: ""
  maxBodyBytes: ""
  # Anyray Portal metering. ON by default — every deployment connects for content-free
  # usage metering. `setup.sh --k8s --connect <token>` folds ANYRAY_DEPLOYMENT_TOKEN +
  # ANYRAY_PSEUDONYM_SALT into the Secret. The control-plane host and the vendor verify
  # key are pinned in the gateway image, so they are NOT set here. (With enabled: true
  # but no deployment token in the Secret, the gateway serves through the first-boot
  # grace window, then blocks /v1 until a token is wired.)
  metering:
    enabled: true
    intervalMs: "900000"
    graceMs: "86400000"
  # Extra env vars (provider-key fallbacks, rate limits, …)
  # in plain k8s env syntax: [{name: ANYRAY_RATE_LIMIT_RPM, value: "600"}]
  extraEnv: []
  # Persist /data (provider keys, routing config, spend + audit logs) across
  # pod restarts. Requires replicas: 1 — the PVC is ReadWriteOnce.
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""

# Optimizer
optimizer:
  replicas: 1
  # Persist /data (optimizer config + audit log) across pod restarts.
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  extraEnv: []

# Proxy (nginx reverse proxy / console)
proxy:
  replicas: 1
  service:
    type: ClusterIP
    # Set for NodePort installs, for example: 30000
    nodePort: null
    # Set for LoadBalancer installs to keep the console private to your org/VPN.
    loadBalancerSourceRanges: []
  resources:
    requests:
      cpu: "25m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  extraEnv: []

# Observability backend web (trace API + UI engine)
web:
  replicas: 1
  nextauthUrl: ""
  # The Langfuse console (Next.js) sizes its V8 heap from the container memory
  # limit; at the previous 1Gi it capped old-space near ~512MB and OOM'd during
  # init, crashlooping and timing out the post-install model-seeder hook. Pin the
  # heap explicitly (deterministic regardless of cgroup detection) and give the
  # container 2Gi of headroom. Set nodeOptions to "" to let Node auto-size.
  nodeOptions: "--max-old-space-size=1536"
  resources:
    requests:
      cpu: "200m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  extraEnv: []

# Observability backend worker
worker:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  extraEnv: []

# Postgres
postgres:
  enabled: true
  storage: 10Gi
  storageClass: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  external:
    # Prefer databaseUrlSecretKeyRef for production credentials.
    databaseUrl: ""
    databaseUrlSecretKeyRef: {}
    # name: anyray-external-postgres
    # key: DATABASE_URL

# ClickHouse
clickhouse:
  enabled: true
  storage: 20Gi
  storageClass: ""
  podSecurityContext:
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  external:
    migrationUrl: ""
    url: ""
    user: clickhouse
    password: ""
    passwordSecretKeyRef: {}
    # name: anyray-external-clickhouse
    # key: CLICKHOUSE_PASSWORD

# MinIO
minio:
  enabled: true
  storage: 10Gi
  storageClass: ""
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

# S3-compatible object storage used by the observability backend. Defaults point
# at the in-chart MinIO service. For external S3, set minio.enabled=false and
# override the endpoint/bucket/credentials below.
objectStorage:
  accessKeyId: minio
  accessKeyIdSecretKeyRef: {}
  secretAccessKey: ""
  secretAccessKeySecretKeyRef: {}
  eventUpload:
    bucket: langfuse
    region: auto
    endpoint: ""
    forcePathStyle: "true"
    prefix: events/
  mediaUpload:
    bucket: langfuse
    region: auto
    endpoint: ""
    forcePathStyle: "true"
    prefix: media/

# Redis
redis:
  enabled: true
  storage: 2Gi
  storageClass: ""
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  external:
    host: ""
    port: "6379"
    auth: ""
    authSecretKeyRef: {}
    # name: anyray-external-redis
    # key: REDIS_AUTH

# Ingress — disabled by default; fill in and set enabled: true to expose externally.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  # Optional override for one or more hosts. Leave empty to use `host`.
  # - host: anyray.example.com
  #   paths:
  #     console: /
  #     gateway: /v1
  #     admin: /admin
  # Example annotations for nginx ingress:
  #   kubernetes.io/ingress.class: nginx
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  tls: []
  # - secretName: anyray-tls
  #   hosts:
  #     - anyray.example.com
