# Anyray Helm chart values.
# Run setup.sh --k8s to generate anyray-secrets.yaml + a starter my-values.yaml,
# then install into your chosen namespace:
#   kubectl apply -n "$ANYRAY_NAMESPACE" -f anyray-secrets.yaml
#   helm install anyray ./helm -f my-values.yaml --namespace "$ANYRAY_NAMESPACE"
# Omit the namespace flags only when you intentionally want the current kubectl/Helm namespace.

# The cluster's external Ingress/LoadBalancer DNS endpoint (console + gateway).
# Required. Must be a hostname, not a node IP — it becomes the Ingress host: rule,
# which matches on the HTTP Host header.
host: ""

image:
  tag: "v1.10.3"
  pullPolicy: IfNotPresent

# Name of the Kubernetes Secret created by: ./setup.sh --k8s
secretName: anyray-secrets

# Gateway
gateway:
  replicas: 1
  service:
    type: ClusterIP
    # Set for NodePort installs, for example: 30787
    nodePort: null
    # Set for LoadBalancer installs to keep the gateway private to your org/VPN.
    loadBalancerSourceRanges: []
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # Content privacy: encrypted | off
  # Never set to plaintext in production.
  contentMode: encrypted
  allowPlaintext: "false"
  optimizerTimeoutMs: "800"
  optimizerVisionTimeoutMs: "10000"
  # On-top mode: point Anyray at an existing OpenAI-compatible gateway (LiteLLM,
  # OpenRouter, …) so clients send NO per-request x-anyray-config header — the
  # gateway seeds its default routing config from this URL on first boot. For an
  # internal/loopback upstream, also set customHostAllowlist (hostname, no port)
  # and trustedCustomHosts so the host clears the SSRF proxy guard.
  upstreamUrl: ""
  customHostAllowlist: ""
  trustedCustomHosts: ""
  # Anyray Cloud metering. `setup.sh --k8s --connect <token>` turns this on and folds
  # ANYRAY_DEPLOYMENT_TOKEN + ANYRAY_PSEUDONYM_SALT into the Secret. The control-plane
  # host and the vendor verify key are pinned in the gateway image, so they are NOT set
  # here. Leave enabled: false for a standalone (unmetered) install.
  metering:
    enabled: false
    intervalMs: "900000"
    graceMs: "86400000"
  # Extra env vars (provider-key fallbacks, rate limits, …)
  # in plain k8s env syntax: [{name: ANYRAY_RATE_LIMIT_RPM, value: "600"}]
  extraEnv: []
  # Persist /data (provider keys, routing config, spend + audit logs) across
  # pod restarts. Requires replicas: 1 — the PVC is ReadWriteOnce.
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""

# Optimizer
optimizer:
  replicas: 1
  # Persist /data (optimizer config + audit log) across pod restarts.
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

# Proxy (nginx reverse proxy / console)
proxy:
  replicas: 1
  service:
    type: ClusterIP
    # Set for NodePort installs, for example: 30000
    nodePort: null
    # Set for LoadBalancer installs to keep the console private to your org/VPN.
    loadBalancerSourceRanges: []
  resources:
    requests:
      cpu: "25m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

# Observability backend web (trace API + UI engine)
web:
  replicas: 1
  # The Langfuse console (Next.js) sizes its V8 heap from the container memory
  # limit; at the previous 1Gi it capped old-space near ~512MB and OOM'd during
  # init, crashlooping and timing out the post-install model-seeder hook. Pin the
  # heap explicitly (deterministic regardless of cgroup detection) and give the
  # container 2Gi of headroom. Set nodeOptions to "" to let Node auto-size.
  nodeOptions: "--max-old-space-size=1536"
  resources:
    requests:
      cpu: "200m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

# Observability backend worker
worker:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Postgres
postgres:
  storage: 10Gi
  storageClass: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ClickHouse
clickhouse:
  storage: 20Gi
  storageClass: ""
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

# MinIO
minio:
  storage: 10Gi
  storageClass: ""
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

# Redis
redis:
  storage: 2Gi
  storageClass: ""
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# Ingress — disabled by default; fill in and set enabled: true to expose externally.
ingress:
  enabled: false
  className: ""
  annotations: {}
  # Example annotations for nginx ingress:
  #   kubernetes.io/ingress.class: nginx
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  tls: []
  # - secretName: anyray-tls
  #   hosts:
  #     - anyray.example.com
